version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketz-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-ticketz}
      POSTGRES_PASSWORD: ${DB_PASS:-ticketz_password}
      POSTGRES_DB: ${DB_NAME:-ticketz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketz-network

  redis:
    image: redis:7-alpine
    container_name: ticketz-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - ticketz-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketz-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-ticketz}
      DB_PASS: ${DB_PASS:-ticketz_password}
      DB_NAME: ${DB_NAME:-ticketz}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      FRONTEND_URL: ${FRONTEND_URL:-*}
      BACKEND_URL: ${BACKEND_URL}
      JWT_SECRET: ${JWT_SECRET:-your_secret_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENV_TOKEN: ${ENV_TOKEN}
      SOCKET_ADMIN: ${SOCKET_ADMIN}
      SOCKET_ADMIN_USER: ${SOCKET_ADMIN_USER}
      SOCKET_ADMIN_PASSWORD: ${SOCKET_ADMIN_PASSWORD}
      # Add other necessary env vars here
    volumes:
      - ./backend/public:/usr/src/app/public
      - ./backend/private:/usr/src/app/private
    ports:
      - "8080:3000"
    networks:
      - ticketz-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketz-frontend
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_PROTOCOL: ${BACKEND_PROTOCOL:-http}
      BACKEND_HOST: ${BACKEND_HOST:-localhost}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      BACKEND_PATH: ${BACKEND_PATH:-}
      REACT_APP_BACKEND_URL: ${BACKEND_URL}
    ports:
      - "3000:80"
    networks:
      - ticketz-network

networks:
  ticketz-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
